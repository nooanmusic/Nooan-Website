<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Page not found — Noan Cittadino.">
  <meta name="robots" content="noindex, follow">
  <meta name="theme-color" content="#c47a4a">
  <title>404 — Noan Cittadino</title>
  <link rel="icon" href="assets/favicon.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;}
    body{
      font-family:'Lexend',system-ui,sans-serif;
      background:#c8c0a8;
      color:#3d3532;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:2rem;
    }
    .nf{
      background:#3d3532;
      color:#e8e0c8;
      padding:3rem 2.5rem;
      border-radius:8px;
      max-width:420px;
      text-align:center;
      box-shadow:0 8px 32px rgba(42,34,32,.3);
    }
    .nf h1{
      font-size:clamp(3rem,12vw,5rem);
      font-weight:900;
      color:#c47a4a;
      line-height:1;
      margin-bottom:1rem;
    }
    .nf p{
      font-size:1rem;
      font-weight:400;
      margin-bottom:1.5rem;
      opacity:.9;
    }
    .nf a{
      display:inline-block;
      font-weight:700;
      color:#c47a4a;
      text-decoration:none;
      border-bottom:1px solid #c47a4a;
      padding-bottom:2px;
      transition:opacity .2s;
    }
    .nf a:hover{opacity:.7;}
  </style>
</head>
<body>
  <main class="nf">
    <h1>404</h1>
    <p>This page does not exist.</p>
    <a href="/">Back to home</a>
  </main>
</body>
</html>
